version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: pitcrew_api
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:xIIBXqpGxb9O8VGYvZWZq/SkXQDNKSJpLIhLVwuJaPI=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: pitcrew_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pitcrew

  postgres:
    image: postgres:15
    container_name: pitcrew_postgres
    environment:
      POSTGRES_DB: pitcrew_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pitcrew_migration_test.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pitcrew
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  pitcrew:
    driver: bridge
