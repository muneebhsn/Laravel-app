# DEV PIPELINE — triggers on push to main branch
# Builds production image, pushes to Artifact Registry, deploys to Cloud Run dev

substitutions:
  _REGION: "us-east4"
  _DB_HOST: "/cloudsql/watchful-force-495414-t4:us-east4:pitcrew-db-dev"
  _DB_NAME: "pitcrew_db"
  _DB_USER: "laravel_user"
  _CLOUD_RUN_SERVICE: "pitcrew-api-dev"

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--target=production'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel-api:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel-api:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_CLOUD_RUN_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel-api:latest'
      - '--region=${_REGION}'
      - '--allow-unauthenticated'
      - '--service-account=cloud-build-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--add-cloudsql-instances=watchful-force-495414-t4:us-east4:pitcrew-db-dev'
      - '--update-env-vars=APP_ENV=development,APP_DEBUG=true,LOG_CHANNEL=stackdriver,DB_CONNECTION=pgsql,DB_HOST=${_DB_HOST},DB_PORT=5432,DB_DATABASE=${_DB_NAME},DB_USERNAME=${_DB_USER}'
      - '--set-secrets=APP_KEY=laravel-app-key:latest,DB_PASSWORD=laravel-db-password:latest'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/pitcrew-repo-dev/laravel-api:latest'
